<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Posts — Arpit Codes</title>
  <link rel="stylesheet" href="style.css" />
  <script defer src="speed-insights-init.js"></script>
  <style>
    /* PAGE HEADER */
    .page-header {
      background: var(--cream);
      border-bottom: var(--border);
      padding: 4.5rem 4rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 1.5rem;
      flex-wrap: wrap;
    }
    .page-title strong {
      display: block;
      font-family: var(--font-mono);
      font-style: normal;
      font-size: 0.62rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 3px;
      color: var(--warm-brown);
      margin-bottom: 0.4rem;
    }
    .page-title {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: clamp(2rem, 4.5vw, 3.5rem);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.5px;
    }
    .post-count-big {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 5rem;
      color: var(--warm-tan);
      line-height: 1;
      user-select: none;
    }

    /* FILTER BAR */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 1.1rem 4rem;
      border-bottom: var(--border);
      background: var(--white);
      flex-wrap: wrap;
    }
    .filter-label {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #9a7d60;
      margin-right: 0.4rem;
    }
    .filter-btn {
      font-family: var(--font-mono);
      font-size: 0.64rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 500;
      background: transparent;
      border: var(--border);
      padding: 5px 12px;
      cursor: none;
      color: var(--black);
      transition: background 0.1s, transform 0.1s, box-shadow 0.1s;
    }
    .filter-btn:hover {
      background: var(--warm-yellow);
      transform: translate(-1px,-1px);
      box-shadow: 2px 2px 0 var(--black);
    }
    .filter-btn.active {
      background: var(--black);
      color: var(--cream);
      box-shadow: 3px 3px 0 var(--warm-brown);
    }

    /* GRID */
    .blog-section { padding: 3rem 4rem 5rem; }
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      border: var(--border);
      box-shadow: var(--shadow-lg);
    }

    /* CARD */
    .blog-card {
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: var(--black);
      background: var(--cream);
      border-bottom: var(--border);
      border-right: var(--border);
      transition: background 0.12s;
      position: relative;
    }
    /* right border only on odd (left column) */
    .blog-card:nth-child(even) { border-right: none; }
    /* last row bottom border */
    .blog-card:nth-last-child(1):nth-child(odd),
    .blog-card:nth-last-child(1):nth-child(even),
    .blog-card:nth-last-child(2):nth-child(odd) { border-bottom: none; }

    .blog-card:hover { background: var(--warm-yellow); z-index: 2; }

    .card-bar  { height: 5px; }
    .card-body {
      padding: 2rem 2.25rem 1.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .card-tag {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 3px 8px;
      border: var(--border);
      font-weight: 500;
    }
    .card-date {
      font-family: var(--font-mono);
      font-size: 0.63rem;
      color: #8a6840;
      text-transform: uppercase;
    }
    .card-time {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      color: #b09070;
      margin-left: auto;
    }
    .card-title {
      font-family: var(--font-serif);
      font-size: 1.2rem;
      font-weight: 400;
      line-height: 1.3;
    }
    .card-excerpt {
      font-size: 0.83rem;
      line-height: 1.7;
      color: #5a4030;
      flex: 1;
    }
    .blog-card:hover .card-excerpt { color: #3a2010; }
    .card-footer {
      padding: 0.9rem 2.25rem 1.4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--font-mono);
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #9a7d60;
    }
    .card-arrow {
      width: 24px; height: 24px;
      background: var(--black);
      color: var(--cream);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem;
      border: var(--border);
      transition: transform 0.1s, background 0.1s, color 0.1s;
      flex-shrink: 0;
    }
    .blog-card:hover .card-arrow { background: var(--cream); color: var(--black); transform: rotate(-45deg); }

    /* EMPTY */
    #no-results {
      display: none;
      padding: 4rem 2rem;
      text-align: center;
      border: var(--border);
      margin-top: 0;
    }
    #no-results p { font-family: var(--font-serif); font-style: italic; font-size: 1.3rem; color: #9a7d60; }

    /* RESPONSIVE */
    @media (max-width: 860px) {
      .blog-grid { grid-template-columns: 1fr; }
      .blog-card { border-right: none !important; border-bottom: var(--border) !important; }
      .blog-card:last-child { border-bottom: none !important; }
    }
    @media (max-width: 680px) {
      .page-header  { padding: 3rem 2rem 2.5rem; }
      .post-count-big { display: none; }
      .filter-bar   { padding: 1rem 2rem; }
      .blog-section { padding: 2rem 2rem 4rem; }
    }
    @media (max-width: 480px) {
      .page-title   { font-size: 2rem; }
      .filter-btn   { padding: 4px 10px; }
      .card-body    { padding: 1.5rem 1.5rem 1rem; }
      .card-footer  { padding: 0.75rem 1.5rem 1.25rem; }
    }
  </style>
</head>
<body>
  <div id="cursor"></div>
  <div id="cursor-ring"></div>

  <nav>
    <a href="landing.html" class="nav-logo"><strong>AC</strong>Arpit Codes</a>
    <button class="nav-hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="nav-links">
      <li><a href="landing.html"     class="nav-btn">Home</a></li>
      <li><a href="card_layout.html" class="nav-btn active">Read Blogs</a></li>
      <li><a href="about.html"       class="nav-btn">About</a></li>
      <li><a href="https://forms.gle/bAB9upZCvxVqhP1UA" target="_blank" class="nav-btn">Feedback ↗</a></li>
    </ul>
  </nav>

  <main>
    <div class="page-header">
      <div>
        <h1 class="page-title">
          <strong>All Posts</strong>
          All the writing,<br>in one place.
        </h1>
      </div>
      <div class="post-count-big" id="count-display">—</div>
    </div>

    <div class="filter-bar">
      <span class="filter-label">Filter</span>
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="Web Development">Web Development</button>
      <button class="filter-btn" data-filter="AI & Machine Learning">AI &amp; Machine Learning</button>
      <button class="filter-btn" data-filter="Data Science">Data Science</button>
      <button class="filter-btn" data-filter="Others">Others</button>
    </div>

    <section class="blog-section">
      <div class="blog-grid" id="blog-grid"></div>
      <div id="no-results"><p>Nothing here for that filter.</p></div>
    </section>
  </main>

  <footer>
    <div class="footer-logo">Arpit Codes</div>
    <p>© 2026 · Code &amp; Coffee </p>
  </footer>

  <script src="blog-data.js"></script>
  <script src="cursor.js"></script>
  <script>
    var TAG_COLORS = {
      "Web Development":     'var(--warm-yellow)',
      "AI & Machine Learning": 'var(--warm-orange)',
      "Data Science":        'var(--warm-tan)',
      "Others":         'var(--warm-red)'
    };

    var grid       = document.getElementById('blog-grid');
    var noResults  = document.getElementById('no-results');
    var countEl    = document.getElementById('count-display');
    var filterBtns = document.querySelectorAll('.filter-btn');
    var sorted     = BLOG_POSTS.slice().sort(function(a,b){ return new Date(b.date)-new Date(a.date); });

    countEl.textContent = sorted.length;

    function renderCards(posts) {
      grid.innerHTML = '';
      if (!posts.length) {
        noResults.style.display = 'block';
        grid.style.display = 'none';
        return;
      }
      noResults.style.display = 'none';
      grid.style.display = 'grid';

      posts.forEach(function(post, i) {
        var color = TAG_COLORS[post.tag] || 'var(--warm-tan)';
        var card  = document.createElement('a');
        card.className = 'blog-card';
        card.href = 'blog_post.html?id=' + post.id;
        card.setAttribute('data-reveal', '');
        card.setAttribute('data-delay', i * 60);
        card.innerHTML =
          '<div class="card-bar" style="background:' + color + '"></div>' +
          '<div class="card-body">' +
            '<div class="card-meta">' +
              '<span class="card-tag" style="background:' + color + '">' + post.tag + '</span>' +
              '<span class="card-date">' + formatDate(post.date) + '</span>' +
              '<span class="card-time">' + post.readTime + '</span>' +
            '</div>' +
            '<h2 class="card-title">' + post.title + '</h2>' +
            '<p class="card-excerpt">' + post.excerpt + '</p>' +
          '</div>' +
          '<div class="card-footer">' +
            '<span>Read post</span>' +
            '<span class="card-arrow">→</span>' +
          '</div>';
        grid.appendChild(card);
      });

      // reveal newly added cards
      if ('IntersectionObserver' in window) {
        var obs = new IntersectionObserver(function(entries) {
          entries.forEach(function(e) {
            if (e.isIntersecting) {
              var delay = parseInt(e.target.dataset.delay || 0, 10);
              setTimeout(function(){ e.target.classList.add('revealed'); }, delay);
              obs.unobserve(e.target);
            }
          });
        }, { threshold: 0.06 });
        grid.querySelectorAll('[data-reveal]').forEach(function(el){ obs.observe(el); });
      } else {
        grid.querySelectorAll('[data-reveal]').forEach(function(el){ el.classList.add('revealed'); });
      }
    }

    renderCards(sorted);

    filterBtns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        filterBtns.forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
        var f = btn.dataset.filter;
        renderCards(f === 'all' ? sorted : sorted.filter(function(p){ return p.tag === f; }));
      });
    });
  </script>
</body>
</html>
